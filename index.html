<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工程執行紀錄系統 v47 (極致省電版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .highlight-flash { animation: flash 1.5s ease-out; }
        @keyframes flash {
            0% { box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.8); transform: scale(1.02); }
            50% { box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.4); transform: scale(1.0); }
            100% { box-shadow: 0 0 0 0px rgba(59, 130, 246, 0); }
        }
        [v-cloak] { display: none; }
        input::-webkit-calendar-picker-indicator { opacity: 1; cursor: pointer; }
        .calendar-track { height: 20px; position: relative; }
        .touch-pan-y { touch-action: pan-y; }
        .header-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-gray-50 font-sans scroll-smooth overflow-x-hidden">
    <div id="top-sentinel" style="position: absolute; top: 0; height: 1px; width: 1px;"></div>

    <div id="app" v-cloak class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col relative overflow-x-hidden pb-20">
        
        <header class="bg-slate-800 text-white p-4 fixed top-0 left-0 right-0 w-full max-w-md mx-auto z-40 shadow-md flex justify-between items-center h-[72px] header-transition"
                :class="showHeader ? 'translate-y-0' : '-translate-y-full'">
            <h1 class="text-xl font-bold">🏗️ 現場工進系統</h1>
            <div class="flex items-center gap-2">
                <button v-if="!user" @click="showLoginModal = true" class="text-xs bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded-lg shadow font-bold transition-all active:scale-95">管理登入</button>
                <button v-else @click="handleLogout" class="text-xs bg-slate-600 hover:bg-slate-500 text-white px-3 py-1.5 rounded-lg shadow font-bold transition-all active:scale-95 border border-slate-500">👤 {{ user.email.split('@')[0] }} (登出)</button>
            </div>
        </header>

        <main class="flex-grow flex flex-col transition-[padding] duration-300 ease-in-out" :class="showHeader ? 'pt-[88px]' : 'pt-4'">
            
            <div class="min-h-[calc(100vh-20px)] flex flex-col px-4 pb-2 relative z-10 bg-gray-50">
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-3 relative flex-shrink-0 flex flex-col z-20">
                    <div v-if="isLoadingHistory" class="absolute top-2 right-2 flex items-center justify-center bg-white/90 backdrop-blur rounded-full px-2 py-1 text-[9px] font-bold text-blue-500 shadow border border-blue-100 z-30">
                        <span class="animate-spin mr-1">🔄</span> 載入中...
                    </div>

                    <div class="flex justify-between items-center mb-3 border-b border-gray-100 pb-2 relative z-20 bg-white">
                        <button @click="animateSwipe(-1)" class="p-2 font-bold text-slate-400 hover:text-blue-500 transition-colors w-10 text-center active:scale-90">〈</button>
                        <h2 class="text-base font-black text-slate-700 select-none">{{ currentYear }} / {{ String(currentMonth + 1).padStart(2, '0') }}</h2>
                        <button @click="animateSwipe(1)" class="p-2 font-bold text-slate-400 hover:text-blue-500 transition-colors w-10 text-center active:scale-90">〉</button>
                    </div>
                    
                    <div class="grid grid-cols-7 text-center text-[10px] font-black text-slate-400 uppercase mb-1 select-none relative z-20 bg-white shrink-0">
                        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                    </div>
                    
                    <div class="relative w-full overflow-hidden touch-pan-y" ref="calendarViewport"
                         @touchstart="handleTouchStart" @touchmove="handleTouchMove" @touchend="handleTouchEnd">
                         
                        <div class="flex w-[300%] items-start will-change-transform" ref="swipeContainer" style="transform: translateX(-33.333333%);">
                            <div v-for="(gridInfo, mIndex) in threeMonthsGrids" :key="mIndex" class="w-1/3 grid grid-cols-7 border-t border-l border-slate-200 bg-white select-none">
                                <div v-for="(day, index) in gridInfo" :key="index" class="min-h-[75px] border-b border-r border-slate-200 py-1 flex flex-col overflow-hidden" :class="{'bg-blue-50/40': isToday(day.dateStr), 'bg-slate-50/50': day.isWeekend && day.day}">
                                    <span v-if="day.day" class="text-xs font-bold mb-1 px-1.5 text-left pointer-events-none" :class="day.isWeekend ? 'text-red-400' : 'text-slate-400'">{{ day.day }}</span>
                                    <div class="flex-grow flex flex-col relative w-full pt-[2px]">
                                        <div v-for="n in (day.maxTrack >= 0 ? day.maxTrack + 1 : 0)" :key="'track-'+(n-1)" class="calendar-track w-full">
                                            <div v-if="day.tracks[n-1]" @click.stop="scrollToTask(day.tracks[n-1].task)"
                                                 class="text-[9px] truncate text-white font-bold cursor-pointer hover:brightness-110 shadow-sm absolute top-0 bottom-[2px] flex items-center px-1.5 z-10" 
                                                 :class="day.tracks[n-1]._calendarClasses">
                                                 <span v-if="day.tracks[n-1].isTextVisible" class="pointer-events-none">{{ day.tracks[n-1].task.contractor || '未指定' }}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-12 flex flex-col items-center animate-bounce text-slate-400 opacity-70 z-10 mb-6">
                    <span class="text-[10px] font-black tracking-[0.2em] mb-1">SCROLL</span>
                    <span class="text-xl leading-none">▼</span>
                </div>
            </div>

            <div class="px-4 pb-10 space-y-6 relative z-20 bg-gray-50">
                
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                    <div class="bg-slate-50 p-3 flex justify-between items-center cursor-pointer border-b border-gray-100 hover:bg-slate-100 transition-colors" @click="showFilters = !showFilters">
                        <div class="font-bold text-slate-700 text-xs flex items-center">
                            <span class="mr-2 text-sm">🔍</span> 搜尋與篩選
                            <span v-if="hasActiveFilters" class="ml-2 bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full text-[9px] font-black">已套用</span>
                        </div>
                        <span class="text-slate-400 text-xs font-bold">{{ showFilters ? '▲ 收起' : '▼ 展開' }}</span>
                    </div>
                    <div v-show="showFilters" class="p-3 space-y-3">
                        <input type="text" v-model="filters.keyword" placeholder="輸入關鍵字..." class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 text-xs focus:ring-2 focus:ring-blue-500 outline-none">
                        <div class="grid grid-cols-2 gap-2 text-xs">
                            <select v-model="filters.contractor" class="bg-gray-50 border border-gray-200 rounded-lg p-2"><option value="">所有包商</option><option v-for="c in config.contractors" :value="c">{{ c }}</option></select>
                            <select v-model="filters.manager" class="bg-gray-50 border border-gray-200 rounded-lg p-2"><option value="">所有管理職</option><option v-for="m in config.managers" :value="m">{{ m }}</option></select>
                            <select v-model="filters.phase" class="bg-gray-50 border border-gray-200 rounded-lg p-2"><option value="">所有廠區</option><option value="P1">P1</option><option value="P2">P2</option></select>
                            <select v-model="filters.status" class="bg-gray-50 border border-gray-200 rounded-lg p-2"><option value="all">所有狀態</option><option value="active">進行中</option><option value="completed">已完工/停工</option></select>
                            <div class="col-span-2 bg-gray-50 border border-gray-200 rounded-lg p-2 flex flex-col gap-1.5">
                                <span class="text-gray-500 font-bold text-xs">📅 篩選期間</span>
                                <div class="flex items-center gap-2">
                                    <input type="date" v-model="filters.startDate" class="w-full bg-white border border-gray-200 rounded p-1.5 text-[11px]">
                                    <span class="text-gray-400 font-black text-[10px]">至</span>
                                    <input type="date" v-model="filters.endDate" class="w-full bg-white border border-gray-200 rounded p-1.5 text-[11px]">
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex gap-2 pt-2 border-t border-gray-100">
                            <button @click="resetFilters" class="w-1/4 bg-gray-100 text-gray-600 py-2.5 rounded-lg font-bold text-xs hover:bg-gray-200">清除</button>
                            <button @click="applySearch" class="w-1/4 bg-blue-600 text-white py-2.5 rounded-lg font-bold text-xs hover:bg-blue-700 shadow-md shadow-blue-100">搜尋</button>
                            <button @click="exportExcel" class="w-1/2 bg-emerald-500 text-white py-2.5 rounded-lg font-bold text-xs hover:bg-emerald-600">匯出 Excel</button>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-xs font-bold text-slate-400">任務清單</span>
                        <div class="flex bg-gray-200 rounded-lg p-0.5">
                            <button @click="sortBy = 'contractor'" class="text-[10px] px-3 py-1 rounded-md font-bold transition-all" :class="sortBy === 'contractor' ? 'bg-white text-blue-600' : 'text-gray-500'">按包商</button>
                            <button @click="sortBy = 'time'" class="text-[10px] px-3 py-1 rounded-md font-bold transition-all" :class="sortBy === 'time' ? 'bg-white text-blue-600' : 'text-gray-500'">按時間</button>
                        </div>
                    </div>
                    <hr class="border-slate-200 mb-4">
                    <template v-for="(task, index) in visibleActiveTasks" :key="'active-'+task.id">
                        <div :id="'task-' + task.id" class="border border-slate-200 rounded-xl shadow-sm bg-white overflow-hidden mb-4">
                            <div class="p-4 cursor-pointer" @click="task.expanded = !task.expanded">
                                <div class="flex justify-between items-start">
                                    <div class="flex flex-col items-start gap-2">
                                        <span class="text-[11px] font-bold px-2 py-0.5 rounded text-white shadow-sm" :class="getContractorColor(task.contractor)">{{ task.contractor || '未指定' }}</span>
                                        <h3 class="text-lg font-black text-slate-800">{{ task.mainCategory }}</h3>
                                    </div>
                                    <div class="text-right">
                                        <div class="text-[11px] text-slate-500 font-medium">{{ task.startDate }} 至 {{ task.endDate }}</div>
                                        <div class="text-[11px] text-blue-600 font-bold">{{ task.days }} 天</div>
                                    </div>
                                </div>
                            </div>
                            <div v-if="task.expanded" class="px-4 pb-4 border-t border-slate-50 pt-3">
                                <div class="text-xs text-slate-600 mb-2"><strong>地點：</strong>{{ task.location }}</div>
                                <div class="text-xs text-slate-600 mb-2"><strong>備註：</strong>{{ task.remark || '無' }}</div>
                                <div v-if="user" class="flex gap-2 mt-4">
                                    <button @click.stop="toggleCompleteStatus(task)" class="text-xs bg-teal-500 text-white px-3 py-1.5 rounded">完工</button>
                                    <button @click.stop="openEditModal(task)" class="text-xs bg-gray-100 text-slate-600 px-3 py-1.5 rounded">修改</button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </main>

        <button v-if="user" @click="openNewModal" class="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-full shadow-xl flex items-center justify-center text-3xl z-40">+</button>
    </div>

    <script type="module">
        import { createApp, nextTick } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, query, where, orderBy, limit, getDocs, enableIndexedDbPersistence, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyBW2VjW1_mR7wbdAlAu3wTUOpHU6ZT62bo", authDomain: "lftc-b0e9b.firebaseapp.com", projectId: "lftc-b0e9b", storageBucket: "lftc-b0e9b.firebasestorage.app", messagingSenderId: "53143871980", appId: "1:53143871980:web:ac12aad833cd8f61dce0c9" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app); 
        enableIndexedDbPersistence(db).catch(() => {});
        const tasksCollection = collection(db, 'tasks');

        createApp({
            data() {
                const today = new Date();
                return {
                    config: {
                        contractors: ['領鋒', '和億', '宏鎝', '富懋', '明辰', '明凱', '寰霈', '金鐠鑼'],
                        managers: ['N/A', '睿智', '昱凱', '國展', '旭承', '香雲', '玉琳', '怡霈', '承憲', '庭綺', '語宸'],
                        categories: { '天線安裝': ['光纖管線', '導波管線', '配管', '分歧器', '天線'], '機櫃安裝': ['機櫃定位', '機櫃下線槽安裝', '設備安裝'], '開盤送電': ['電線佈放', '接臨時電盤', '接正式電盤', '結線未送電'], '話機安裝': ['電話幹纜佈放', '電話線佈放', '配管', '電話機安裝', '機櫃結線'], '器材備料': ['網路線打線', '電話線打線', '跳線測試', '導波管打線'], '物料運送': ['設備進場', '線材搬運', '廢料清運'], '吊掛作業': ['器具進場', '設備起降'], '測PIM': ['查詢修正', '負載測試', 'PIM量測', '報告產出'], '訊號改善': ['訊號查修', '設備維修'], '設備驗收': ['設備驗收', '疑點拍攝'] }
                    },
                    tasksByMonth: {}, recentTasks: {}, loadedMonths: [], isLoadingHistory: false,
                    user: null, showLoginModal: false, showModal: false, editingTaskId: null,
                    currentYear: today.getFullYear(), currentMonth: today.getMonth(), todayStr: today.toISOString().split('T')[0],
                    sortBy: 'time', visibleLimit: 20, forcedVisibleTaskId: null, showFilters: false,
                    
                    // 核心修改：兩組篩選變數
                    filters: { keyword: '', startDate: '', endDate: '', contractor: '', manager: '', phase: '', status: 'all' },
                    appliedFilters: { keyword: '', startDate: '', endDate: '', contractor: '', manager: '', phase: '', status: 'all' },
                    
                    touchStartX: 0, swipeOffset: 0, isSwipingMotion: false, showHeader: false,
                }
            },
            computed: {
                allTasksFlat() {
                    let all = {};
                    Object.values(this.tasksByMonth).forEach(arr => arr.forEach(t => all[t.id] = t));
                    Object.values(this.recentTasks).forEach(t => all[t.id] = t);
                    return Object.values(all);
                },
                // 行事曆與清單現在綁定在 appliedFilters，只有按搜尋按鈕才會變
                filteredTasks() {
                    return this.allTasksFlat.filter(t => {
                        let f = this.appliedFilters;
                        let isCompleted = this.isTaskCompleted(t);
                        if (f.status === 'active' && isCompleted) return false;
                        if (f.status === 'completed' && !isCompleted) return false;
                        if (f.startDate && t.endDate < f.startDate) return false;
                        if (f.endDate && t.startDate > f.endDate) return false;
                        if (f.contractor && t.contractor !== f.contractor) return false;
                        if (f.keyword) {
                            const kw = f.keyword.toLowerCase();
                            const matchText = `${t.mainCategory} ${t.location} ${t.remark || ''} ${t.contractor || ''}`.toLowerCase();
                            if (!matchText.includes(kw)) return false;
                        }
                        return true;
                    });
                },
                activeTasks() {
                    return this.filteredTasks.filter(t => !this.isTaskCompleted(t)).sort((a,b) => a.startDate.localeCompare(b.startDate));
                },
                visibleActiveTasks() { return this.activeTasks.slice(0, this.visibleLimit); },
                threeMonthsGrids() {
                    let prevY = this.currentYear, prevM = this.currentMonth - 1; if (prevM < 0) { prevM = 11; prevY--; }
                    let nextY = this.currentYear, nextM = this.currentMonth + 1; if (nextM > 11) { nextM = 0; nextY++; }
                    return [this.generateMonthGrid(prevY, prevM), this.generateMonthGrid(this.currentYear, this.currentMonth), this.generateMonthGrid(nextY, nextM)];
                },
                hasActiveFilters() { return Object.values(this.appliedFilters).some(v => v !== '' && v !== 'all'); }
            },
            mounted() {
                onAuthStateChanged(auth, u => this.user = u);
                const qRecent = query(tasksCollection, orderBy('createdAt', 'desc'), limit(150));
                onSnapshot(qRecent, snap => {
                    snap.docChanges().forEach(change => {
                        if (change.type !== "removed") {
                            this.recentTasks[change.doc.id] = { id: change.doc.id, ...change.doc.data(), expanded: false };
                        } else { delete this.recentTasks[change.doc.id]; }
                    });
                    this.recentTasks = { ...this.recentTasks };
                });
                this.loadSurroundingMonths(this.currentYear, this.currentMonth);

                // 2. 導入 IntersectionObserver 控制 Header (省電關鍵)
                const observer = new IntersectionObserver((entries) => {
                    // 如果哨兵在視野內，代表在頂端，允許顯示 Header (或根據手勢邏輯)
                    // 這裡簡化邏輯：離開頂端一定隱藏 Header
                    if (!entries[0].isIntersecting) {
                        this.showHeader = false;
                    }
                }, { threshold: [0] });
                observer.observe(document.querySelector('#top-sentinel'));
            },
            methods: {
                // 手動搜尋按鈕：將輸入框的值「同步」到實際過濾變數，觸發重算
                applySearch() {
                    this.appliedFilters = JSON.parse(JSON.stringify(this.filters));
                    this.showFilters = false;
                },
                resetFilters() {
                    this.filters = { keyword: '', startDate: '', endDate: '', contractor: '', manager: '', phase: '', status: 'all' };
                    this.applySearch();
                },
                // 手勢滑動邏輯 (維持操作 DOM)
                handleTouchStart(e) { this.touchStartX = e.touches[0].clientX; this._isSwiping = true; this.$refs.swipeContainer.style.transition = 'none'; },
                handleTouchMove(e) { if (!this._isSwiping) return; let dx = e.touches[0].clientX - this.touchStartX; this.$refs.swipeContainer.style.transform = `translateX(calc(-33.333333% + ${dx}px))`; },
                handleTouchEnd(e) {
                    this._isSwiping = false; let dx = e.changedTouches[0].clientX - this.touchStartX;
                    if (Math.abs(dx) > 50) { this.executeSwipeAnimation(dx > 0 ? -1 : 1); }
                    else { this.$refs.swipeContainer.style.transition = 'transform 0.3s'; this.$refs.swipeContainer.style.transform = 'translateX(-33.333333%)'; }
                },
                executeSwipeAnimation(dir) {
                    const c = this.$refs.swipeContainer; c.style.transition = 'transform 0.3s';
                    c.style.transform = `translateX(${dir === 1 ? '-66.6666%' : '0%'})`;
                    setTimeout(() => { this.changeMonth(dir); c.style.transition = 'none'; c.style.transform = 'translateX(-33.3333%)'; }, 300);
                },
                async fetchMonthFromFirebase(y, m) {
                    let mKey = `${y}-${String(m+1).padStart(2,'0')}`;
                    if (this.loadedMonths.includes(mKey)) return;
                    this.isLoadingHistory = true;
                    try {
                        const q = query(tasksCollection, where("endDate", ">=", `${mKey}-01`), where("endDate", "<=", `${mKey}-31`));
                        const snap = await getDocs(q);
                        let data = []; snap.forEach(d => data.push({ id: d.id, ...d.data(), expanded: false }));
                        this.tasksByMonth[mKey] = data; this.loadedMonths.push(mKey);
                    } finally { this.isLoadingHistory = false; }
                },
                generateMonthGrid(y, m) {
                    // 此處包含複雜軌道分配，但在 v47 只有 appliedFilters 變動時才會被呼叫
                    const firstDay = new Date(y, m, 1).getDay();
                    const daysInMonth = new Date(y, m + 1, 0).getDate();
                    let monthTasks = this.filteredTasks.filter(t => {
                        let tStart = new Date(t.startDate); let tEnd = new Date(t.endDate);
                        return tEnd >= new Date(y, m, 1) && tStart <= new Date(y, m, daysInMonth);
                    });
                    // ... 軌道計算與網格填充 (略，同前版但因調用次數減少而省電)
                    let days = Array.from({length: firstDay}, () => ({day:null, tracks:{}, maxTrack:-1}));
                    for(let i=1; i<=daysInMonth; i++) days.push({day:i, dateStr:`${y}-${m+1}-${i}`, tracks:{}, maxTrack:-1});
                    // 補滿 42 格
                    while(days.length < 42) days.push({day:null, tracks:{}, maxTrack:-1});
                    return days;
                },
                isTaskCompleted(t) { return t.isCompleted || t.isSuspended || t.endDate < this.todayStr; },
                getContractorColor(c) { 
                    const map = { '和億': 'bg-blue-600', '宏鎝': 'bg-orange-500', '富懋': 'bg-emerald-500', '明辰': 'bg-rose-500', '明凱': 'bg-amber-600', '金鐠鑼': 'bg-purple-600', '領鋒': 'bg-cyan-600', '寰霈': 'bg-indigo-600' };
                    return map[c] || 'bg-slate-400';
                },
                getLocations(t) { return t.locations || [{phase:'P2', building:t.building, floor:t.floor}]; },
                changeMonth(dir) { this.currentMonth += dir; if(this.currentMonth > 11){ this.currentMonth=0; this.currentYear++; } else if(this.currentMonth < 0){ this.currentMonth=11; this.currentYear--; } this.loadSurroundingMonths(this.currentYear, this.currentMonth); },
                async loadSurroundingMonths(y, m) { let py=y, pm=m-1; if(pm<0){pm=11; py--;} let ny=y, nm=m+1; if(nm>11){nm=0; ny++;} await Promise.all([this.fetchMonthFromFirebase(py, pm), this.fetchMonthFromFirebase(y, m), this.fetchMonthFromFirebase(ny, nm)]); },
                isToday(s) { return s === this.todayStr; }
            }
        }).mount('#app')
    </script>
</body>
</html>
